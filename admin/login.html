<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Painel Nexor Digital</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/static/admin.css">
</head>
<body class="login-body">
  <main class="login-card">
    <img src="/assets/logo.png" alt="Nexor Digital" class="login-logo">
    <h1>Painel de Leads</h1>
    <p class="login-sub">Acesso restrito a administradores.</p>

    <form id="formLogin">
      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" autocomplete="username" required>

      <label for="senha">Senha</label>
      <input type="password" id="senha" name="senha" autocomplete="current-password" required>

      <p class="login-erro" id="loginErro" role="alert" hidden></p>

      <button type="submit" id="btnEntrar">Entrar</button>
    </form>
  </main>

  <script>
    const form = document.getElementById('formLogin');
    const erro = document.getElementById('loginErro');
    const btn = document.getElementById('btnEntrar');
    form.addEventListener('submit', async (ev) => {
      ev.preventDefault();
      erro.hidden = true;
      btn.disabled = true; btn.textContent = 'Entrando…';
      try {
        const r = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            senha: document.getElementById('senha').value
          })
        });
        const d = await r.json();
        if (r.ok && d.ok) { location.href = '/admin'; return; }
        erro.textContent = d.erro || 'Falha no login.';
        erro.hidden = false;
      } catch {
        erro.textContent = 'Erro de conexão. Tente novamente.';
        erro.hidden = false;
      } finally {
        btn.disabled = false; btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
